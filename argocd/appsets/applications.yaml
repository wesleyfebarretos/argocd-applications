apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: applications
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/wesleyfebarretos/argocd-applications.git
              revision: main
              files:
                - path: clients/*/*/overlays/*/values.yaml
              pathParamPrefix: overlay
          - git:
              repoURL: https://github.com/wesleyfebarretos/argocd-applications.git
              revision: main
              files:
                - path: "clients/{{ index .overlay.path.segments 1 }}/client.yaml"
              pathParamPrefix: client
  template:
    metadata:
      name: "{{ .namespace }}"
      labels:
        app.kubernetes.io/name: "{{ index .overlay.path.segments 2 }}"
        client: "{{ .clientSlug }}"
    spec:
      project: applications
      source:
        repoURL: https://github.com/wesleyfebarretos/argocd-applications.git
        targetRevision: main
        path: "{{ .overlay.path.path }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - ApplyOutOfSyncOnly=true
